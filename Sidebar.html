<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8" />

    <!-- MathJax 설정 (TeX, $...$, $$...$$ 지원) -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['$$', '$$'], ['\\(', '\\)'], ['\(', '\)']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <!-- MathJax v3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        padding: 2px 2px 2px;
        line-height: 1.8;
        zoom: 1.2;           /* 1.2배 확대 — 1.0~1.5 사이로 조정 가능 */
        overflow-x: auto;    /* 가로 스크롤 허용 (내용이 넘칠 때) */
      }
      
      #meta {
        font-size: 11px;
        color: #666;
        margin-bottom: 8px;
      }
      #contentBox {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 10px;
        min-height: 120px;
        white-space: normal;
        word-break: break-word;
        background: #fff;
      }
      #loading {
        color: #999;
      }
    </style>
  </head>
  <body>
    <div id="meta">활성 셀 내용 미리보기</div>
    <div id="contentBox">
      <span id="loading">가져오는 중...</span>
    </div>

    <script>
      /**
       * 셀 내용을 사이드바에 표시하고 MathJax로 다시 렌더링
       */
      function renderCell(obj) {
        var box = document.getElementById('contentBox');
        var loading = document.getElementById('loading');
        if (loading) loading.remove();

        // 셀 내용
        var text = obj && obj.value ? obj.value : '';

        // 줄바꿈을 <br>로 바꿔서 보여주기
        // 여기서 text는 그대로 innerHTML에 넣어 MathJax가 $...$를 읽도록 한다
        var html = text.replace(/\n/g, '<br>');

        box.innerHTML = html || '<span style="color:#999">빈 셀입니다.</span>';

        // MathJax 다시 렌더링
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise([box]).catch(function (err) {
            console.error(err);
          });
        }
      }

      /**
       * 서버(Apps Script)에서 현재 활성 셀 데이터 받아오기
       */
      function fetchActiveCell() {
        google.script.run
          .withSuccessHandler(function (res) {
            renderCell(res);
          })
          .getActiveCellContent();
      }

      // 처음 한번 불러오기
      fetchActiveCell();

      // 1.5초마다 한 번씩 현재 셀 내용 다시 가져오기
      // (너무 짧게 하면 호출이 많아지니 1500~2000ms 정도가 적당)
      setInterval(fetchActiveCell, 1500);
    </script>
  </body>
</html>
